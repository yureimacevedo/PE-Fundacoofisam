const MainApp=({user,userRol})=>{
  const isAdmin=userRol==='admin'||userRol===null;

    const u=db.collection('fundacoofisam_datos').onSnapshot((s)=>{

      setEntidades(ents);
      if(entidadActiva){const act=ents.find(e=>e.id===entidadActiva.id);if(act)setEntidadActiva(act);}

const VistaEntidades=({user,entidades,entidadActiva,isAdmin})=>{const[modal,setModal]=useState(null);const[form,setForm]=useState({});const[itemEdit,setItemEdit]=useState(null);const[loading,setLoading]=useState(false);
  const[busquedaPOA,setBusquedaPOA]=useState('');const guardar=async(e)=>{e.preventDefault();setLoading(true);try{const scoreConfig={critico:{min:0,max:parseFloat(form.criticoMax||60),color:'#DC2626',label:'Crítico'},precaucion:{min:parseFloat(form.precaucionMin||61),max:parseFloat(form.precaucionMax||85),color:'#F59E0B',label:'Precaución'},optimo:{min:parseFloat(form.optimoMin||86),max:100,color:'#059669',label:'Óptimo'}};const data={nombre:form.nombre,nit:form.nit,periodo:form.periodo,vision:form.vision||'',scoreConfig};if(itemEdit){await db.collection('fundacoofisam_datos').doc(itemEdit.id).update(data);}else{await db.collection('fundacoofisam_datos').add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});}setModal(null);setForm({});setItemEdit(null);}catch(error){alert('Error: '+error.message);}finally{setLoading(false);}};const eliminar=async(id)=>{if(!window.confirm('¿Eliminar entidad y todos sus datos?'))return;try{await db.collection('fundacoofisam_datos').doc(id).delete();}catch(error){alert('Error: '+error.message);}};const editarEntidad=(ent)=>{setItemEdit(ent);setForm({nombre:ent.nombre,nit:ent.nit,periodo:ent.periodo,vision:ent.vision||'',criticoMax:ent.scoreConfig?.critico?.max||60,precaucionMin:ent.scoreConfig?.precaucion?.min||61,precaucionMax:ent.scoreConfig?.precaucion?.max||85,optimoMin:ent.scoreConfig?.optimo?.min||86});setModal('entidad');};
  const[recalcLoading,setRecalcLoading]=useState(null);
  const recalcularScores=async(ent)=>{
    if(!ent.scoreConfig){alert('Esta entidad no tiene configuración de score.');return;}
    if(!window.confirm('¿Recalcular scores de TODOS los registros de "'+ent.nombre+'" según su configuración actual?\n\nCrítico: 0-'+ent.scoreConfig.critico.max+'% | Precaución: '+ent.scoreConfig.precaucion.min+'-'+ent.scoreConfig.precaucion.max+'% | Óptimo: '+ent.scoreConfig.optimo.min+'%+'))return;
    setRecalcLoading(ent.id);
    try{
      const sc=ent.scoreConfig;
      const calcS=(avance,metaMes,tipo)=>{
        if(!metaMes||metaMes===0)return'sin_meta';
        const r=(avance/metaMes)*100;
        if(tipo==='descendente'){
          const inv=r===0?100:Math.min((metaMes/avance)*100,200);
          if(inv>=sc.optimo.min)return'optimo';
          if(inv>=sc.precaucion.min)return'precaucion';
          return'critico';
        }
        if(r>=sc.optimo.min)return'optimo';
        if(r>=sc.precaucion.min)return'precaucion';
        return'critico';
      };
      // Obtener todos los seguimientos de la entidad
      const segsSnap=await db.collection('fundacoofisam_datos').doc(ent.id).collection('seguimientos').get();
      // Obtener todos los indicadores para saber el tipo
      const indsSnap=await db.collection('fundacoofisam_datos').doc(ent.id).collection('indicadores').get();
      const indsMap={};
      indsSnap.forEach(d=>{indsMap[d.id]={...d.data(),id:d.id};});
      // Procesar en lotes de 500 (límite de Firestore batch)
      const docs=segsSnap.docs;
      let lote=db.batch();
      let count=0;
      let total=0;
      for(const doc of docs){
        const seg=doc.data();
        const ind=indsMap[seg.indicadorId];
        if(!seg.metaMes||!seg.avance)continue;
        const tipo=ind?.tipo||'ascendente';
        const nuevoScore=calcS(parseFloat(seg.avance),parseFloat(seg.metaMes),tipo);
        const av=parseFloat(seg.avance),me=parseFloat(seg.metaMes);
        const nuevoRendimiento=me>0?(tipo==='descendente'?(av===0?100:Math.min((me/av)*100,200)):(av/me)*100):0;
        lote.update(doc.ref,{score:nuevoScore,rendimiento:nuevoRendimiento});
        count++;total++;
        if(count===499){await lote.commit();lote=db.batch();count=0;}
      }
      if(count>0)await lote.commit();
      alert('✅ '+total+' registros recalculados correctamente con el score de '+ent.nombre);
    }catch(err){alert('Error: '+err.message);}
    finally{setRecalcLoading(null);}
  };return(<div><div className="page-header"><h1>Mis Entidades</h1>{isAdmin&&<button className="btn-primary" style={{width:'auto'}} onClick={()=>{setItemEdit(null);setForm({nombre:'',nit:'',periodo:'',vision:'',criticoMax:'60',precaucionMin:'61',precaucionMax:'85',optimoMin:'86'});setModal('entidad');}}>+ Nueva Entidad</button>}</div><div className="grid">{entidades.length===0?(<div className="empty-state"><h3>🏢 No hay entidades</h3><p>Crea tu primera entidad</p></div>):(entidades.map(ent=>(<div key={ent.id} className="card" style={{borderLeft:entidadActiva?.id===ent.id?'4px solid #4F46E5':'4px solid transparent'}}><h3>{ent.nombre}</h3><p style={{color:'#6B7280',marginBottom:'0.5rem'}}>NIT: {ent.nit}</p><div className="badge" style={{background:'#4F46E5',color:'white',marginBottom:'0.5rem'}}>{ent.periodo}</div>{ent.vision&&<p style={{color:'#4F46E5',fontSize:'0.875rem',marginBottom:'0.5rem'}}>🎯 {ent.vision}</p>}{ent.scoreConfig&&(<p style={{color:'#059669',fontSize:'0.75rem',marginTop:'0.5rem'}}>Score: 0-{ent.scoreConfig.critico.max}% 🔴 | {ent.scoreConfig.precaucion.min}-{ent.scoreConfig.precaucion.max}% 🟡 | {ent.scoreConfig.optimo.min}%+ 🟢</p>)}{isAdmin&&<div className="btn-group"><button className="btn-edit" onClick={()=>editarEntidad(ent)}>✏️ Editar</button><button className="btn-secondary" onClick={()=>eliminar(ent.id)}>🗑️ Eliminar</button></div>}
              {isAdmin&&<button onClick={()=>recalcularScores(ent)} disabled={recalcLoading===ent.id} style={{marginTop:'0.5rem',width:'100%',padding:'0.5rem',border:'2px solid #4F46E5',borderRadius:'6px',background:'white',color:'#4F46E5',fontWeight:600,cursor:'pointer',fontSize:'0.8rem'}}>
                {recalcLoading===ent.id?'⏳ Recalculando...':'🔄 Recalcular Scores'}
              </button>}</div>)))}</div>{modal==='entidad'&&(<div className="modal-overlay" onClick={()=>setModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2>{itemEdit?'Editar':'Nueva'} Entidad</h2><button className="btn-cerrar" onClick={()=>setModal(null)}>×</button></div><div className="modal-body"><form onSubmit={guardar}><div className="form-group"><label>Nombre *</label><input type="text" value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} required/></div><div className="form-group"><label>NIT *</label><input type="text" value={form.nit} onChange={e=>setForm({...form,nit:e.target.value})} required/></div><div className="form-group"><label>Periodo *</label><input type="text" value={form.periodo} onChange={e=>setForm({...form,periodo:e.target.value})} required placeholder="2025-2027"/></div><div className="form-group"><label>Visión</label><textarea value={form.vision} onChange={e=>setForm({...form,vision:e.target.value})} rows={3}/></div><div className="card" style={{background:'#FEF3C7',marginBottom:'1rem'}}><h4 style={{color:'#92400E',marginBottom:'0.5rem'}}>⚙️ Configuración de Score (Global)</h4><div className="form-row"><div className="form-group"><label>🔴 Crítico: 0% hasta</label><input type="number" value={form.criticoMax} onChange={e=>setForm({...form,criticoMax:e.target.value})} required/></div><div className="form-group"><label>🟡 Precaución: desde</label><input type="number" value={form.precaucionMin} onChange={e=>setForm({...form,precaucionMin:e.target.value})} required/></div></div><div className="form-row"><div className="form-group"><label>🟡 Precaución: hasta</label><input type="number" value={form.precaucionMax} onChange={e=>setForm({...form,precaucionMax:e.target.value})} required/></div><div className="form-group"><label>🟢 Óptimo: desde</label><input type="number" value={form.optimoMin} onChange={e=>setForm({...form,optimoMin:e.target.value})} required/></div></div><small style={{color:'#92400E'}}>Este score se aplicará a TODOS los indicadores de esta entidad</small></div><button type="submit" className="btn-primary" disabled={loading}>{loading?'⏳ Guardando...':'💾 Guardar'}</button></form></div></div></div>)}</div>);};
const VistaDashboard=({entidad,datos})=>{
  const[anioSel,setAnioSel]=useState('');
  const[mesSel,setMesSel]=useState('');
  const[modalInforme,setModalInforme]=useState(false);
  const[actividadesPOA,setActividadesPOA]=useState([]);
  const[planesPOA,setPlanesPOA]=useState([]);

  useEffect(()=>{
    if(!entidad)return;
    const u1=db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      setActividadesPOA(d);
    });
    const u2=db.collection('fundacoofisam_datos').doc(entidad.id).collection('planes_operativos').onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      d.sort((a,b)=>(b.anio||0)-(a.anio||0));
      setPlanesPOA(d);
    });
    return()=>{u1();u2();};
  },[entidad]);

  if(!entidad||!datos)return <div className="empty-state"><h3>Selecciona una entidad</h3></div>;
  const{ejes=[],objetivos=[],indicadores=[],seguimientos=[]}=datos;

  const mesesOrden=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre','Semestral 1','Semestral 2','Anual'];
  const aniosDisp=[...new Set(seguimientos.map(s=>String(s.anio)))].sort();
  const mesesDisp=[...new Set(seguimientos.filter(s=>!anioSel||String(s.anio)===anioSel).map(s=>s.mes))].sort((a,b)=>mesesOrden.indexOf(a)-mesesOrden.indexOf(b));
  const modoAnio=anioSel&&!mesSel; // "Ver todo el año" cuando hay año seleccionado pero no mes

  // Calcular período de referencia
  const periodos=[...new Set(seguimientos.map(s=>s.mes+'|'+s.anio))].sort((a,b)=>{
    const[mA,aA]=a.split('|');const[mB,aB]=b.split('|');
    if(aA!==aB)return parseInt(aA)-parseInt(aB);
    return mesesOrden.indexOf(mA)-mesesOrden.indexOf(mB);
  });
  const ultimoPeriodo=periodos[periodos.length-1];
  const[ultMes,ultAnio]=ultimoPeriodo?ultimoPeriodo.split('|'):['',''];

  const filtroMes=mesSel||(!modoAnio?ultMes:'');
  const filtroAnio=anioSel||ultAnio;
  const segsFiltrados=modoAnio
    ? seguimientos.filter(s=>String(s.anio)===String(filtroAnio))
    : seguimientos.filter(s=>String(s.anio)===String(filtroAnio)&&s.mes===filtroMes);
  const periodoLabel=modoAnio?`Todo el año ${filtroAnio}`:filtroMes&&filtroAnio?(filtroMes+' '+filtroAnio):'Sin datos';

  const porScore={critico:0,precaucion:0,optimo:0,sin_meta:0};
  if(modoAnio){
    indicadores.forEach(ind=>{
      const segsInd=segsFiltrados.filter(s=>s.indicadorId===ind.id);
      if(segsInd.length===0)return;
      const scores=['optimo','precaucion','critico','sin_meta'];
      const mejor=scores.find(sc=>segsInd.some(s=>s.score===sc))||'sin_meta';
      if(porScore[mejor]!==undefined)porScore[mejor]++;
    });
  }else{
    segsFiltrados.forEach(s=>{if(s.score&&porScore[s.score]!==undefined)porScore[s.score]++;});
  }

  const indicadoresConEstado=indicadores.map(ind=>{
    const segsInd=segsFiltrados.filter(s=>s.indicadorId===ind.id);
    const segPeriodo=modoAnio?segsInd[segsInd.length-1]:segsInd[0];
    const segReciente=seguimientos.filter(s=>s.indicadorId===ind.id).sort((a,b)=>{
      if(a.anio!==b.anio)return parseInt(b.anio)-parseInt(a.anio);
      return mesesOrden.indexOf(b.mes)-mesesOrden.indexOf(a.mes);
    })[0];
    const ultSeg=segPeriodo||segReciente;
    let avanceCalc=0;
    let metaCalc=0;
    if(modoAnio){
      segsInd.forEach(s=>{
        if(s.avance)avanceCalc+=parseFloat(s.avance);
        if(s.metaMes)metaCalc+=parseFloat(s.metaMes);
      });
      if(ind.tipoMeta!=='acumulativa'&&segsInd.length>0){
        const ult=segsInd[segsInd.length-1];
        avanceCalc=parseFloat(ult.avance||0);
        metaCalc=parseFloat(ult.metaMes||ind.meta||0);
      }
    }else{
      avanceCalc=ultSeg?.avance||0;
      metaCalc=ultSeg?.metaMes||ind.meta||0;
      if(ind.tipoMeta==='acumulativa'){
        avanceCalc=0;metaCalc=0;
        const todosSegs=seguimientos.filter(s=>s.indicadorId===ind.id&&String(s.anio)===String(filtroAnio));
        const indicesMes=mesesOrden.indexOf(filtroMes);
        todosSegs.forEach(s=>{
          if(mesesOrden.indexOf(s.mes)<=indicesMes){
            if(s.avance)avanceCalc+=parseFloat(s.avance);
            if(s.metaMes)metaCalc+=parseFloat(s.metaMes);
          }
        });
      }
    }
    const obj=objetivos.find(o=>o.id===ind.objetivoId);
    const eje=ejes.find(e=>e.id===obj?.ejeId);
    const enPeriodo=modoAnio?segsInd.length>0:!!segPeriodo;
    const segsAnioOrdenados=modoAnio?[...segsInd].sort((a,b)=>{
      if(a.anio!==b.anio)return parseInt(a.anio)-parseInt(b.anio);
      return mesesOrden.indexOf(a.mes)-mesesOrden.indexOf(b.mes);
    }):[];
    return{...ind,ultimoSeguimiento:ultSeg,avanceAcum:avanceCalc,metaAcum:metaCalc,enPeriodo,objetivo:obj,eje:eje,segsAnio:segsAnioOrdenados};
  }).filter(ind=>ind.enPeriodo||(ind.ultimoSeguimiento&&!modoAnio));

  return(<div>
    <div className="page-header">
      <div>
        <h1>Dashboard - {entidad.nombre}</h1>
        <p style={{color:'#6B7280',fontSize:'0.875rem'}}>{entidad.periodo}</p>
      </div>
      <button className="btn-primary" style={{width:'auto'}} onClick={()=>window.print()}>🖨️ Imprimir Dashboard</button>
    </div>

    <div className="card" style={{marginBottom:'1rem'}}>
      <div style={{display:'flex',gap:'1rem',alignItems:'flex-end',flexWrap:'wrap'}}>
        <div className="form-group" style={{margin:0,minWidth:'140px'}}>
          <label style={{fontSize:'0.85rem',fontWeight:600}}>Año</label>
          <select value={anioSel} onChange={e=>{setAnioSel(e.target.value);setMesSel('');}}
            style={{padding:'0.4rem 0.5rem',border:'2px solid #E5E7EB',borderRadius:'8px',fontSize:'0.9rem',width:'100%'}}>
            <option value="">Último disponible</option>
            {aniosDisp.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <div className="form-group" style={{margin:0,minWidth:'160px'}}>
          <label style={{fontSize:'0.85rem',fontWeight:600}}>Mes / Período</label>
          <select value={mesSel} onChange={e=>setMesSel(e.target.value)}
            style={{padding:'0.4rem 0.5rem',border:'2px solid #E5E7EB',borderRadius:'8px',fontSize:'0.9rem',width:'100%'}}
            disabled={!anioSel&&!mesSel}>
            <option value="">{anioSel?'📅 Todo el año':'Último disponible'}</option>
            {mesesDisp.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div style={{paddingBottom:'0.25rem'}}>
          <span style={{background:modoAnio?'#D1FAE5':'#EEF2FF',color:modoAnio?'#065F46':'#4F46E5',padding:'0.4rem 0.75rem',borderRadius:'8px',fontWeight:700,fontSize:'0.875rem'}}>
            📅 {periodoLabel}
          </span>
        </div>
        {(anioSel||mesSel)&&<button onClick={()=>{setAnioSel('');setMesSel('');}} style={{padding:'0.4rem 0.75rem',border:'1px solid #E5E7EB',borderRadius:'8px',background:'white',cursor:'pointer',fontSize:'0.85rem'}}>✕ Limpiar</button>}
      </div>
    </div>

    {(()=>{
      const sc=entidad.scoreConfig||{critico:{min:0,max:60},precaucion:{min:61,max:85},optimo:{min:86,max:100}};
      const clasificar=(pct)=>{
        if(pct>=sc.optimo.min)return{label:'Óptimo',icon:'🟢',bg:'#D1FAE5',c:'#065F46',borde:'#059669'};
        if(pct>=sc.precaucion.min)return{label:'Precaución',icon:'🟡',bg:'#FEF3C7',c:'#92400E',borde:'#F59E0B'};
        return{label:'Crítico',icon:'🔴',bg:'#FEE2E2',c:'#991B1B',borde:'#DC2626'};
      };

      // ── Semáforo Indicadores ──
      const indConSeg=indicadoresConEstado.filter(i=>i.ultimoSeguimiento);
      const totalInd=indConSeg.length;
      const optimosInd=indConSeg.filter(i=>i.ultimoSeguimiento?.score==='optimo').length;
      const precaucionInd=indConSeg.filter(i=>i.ultimoSeguimiento?.score==='precaucion').length;
      const criticosInd=indConSeg.filter(i=>i.ultimoSeguimiento?.score==='critico').length;
      // Por conteo: % de indicadores en óptimo
      const pctIndConteo=totalInd>0?Math.round((optimosInd/totalInd)*100):0;
      const clIndConteo=totalInd>0?clasificar(pctIndConteo):{label:'Sin datos',icon:'⚪',bg:'#F3F4F6',c:'#6B7280',borde:'#E5E7EB'};
      // Por rendimiento: promedio de rendimientos individuales (cap 100% para no inflar)
      // Rendimiento: filtrar infinitos y NaN, cap 100%, ignorar sin meta
      const indsConRend=indConSeg.filter(i=>{const r=parseFloat(i.ultimoSeguimiento?.rendimiento||0);return isFinite(r)&&!isNaN(r)&&(i.ultimoSeguimiento?.metaMes||0)>0;});
      const pctIndRend=indsConRend.length>0?Math.round(indsConRend.reduce((acc,i)=>acc+Math.min(Math.max(parseFloat(i.ultimoSeguimiento?.rendimiento||0),0),100),0)/indsConRend.length):0;
      const clIndRend=totalInd>0?clasificar(pctIndRend):{label:'Sin datos',icon:'⚪',bg:'#F3F4F6',c:'#6B7280',borde:'#E5E7EB'};

      // ── Semáforo POA ──
      const anioActual=filtroAnio||new Date().getFullYear().toString();
      const planActivo=planesPOA.find(p=>String(p.anio)===String(anioActual))||planesPOA[0];
      const actsDelPlan=planActivo?actividadesPOA.filter(a=>a.planId===planActivo.id):[];
      const pctPOA=calcAvancePOA(actsDelPlan);
      const clPOA=actsDelPlan.length>0?clasificar(pctPOA):{label:'Sin datos',icon:'⚪',bg:'#F3F4F6',c:'#6B7280',borde:'#E5E7EB'};
      const completadasPOA=actsDelPlan.filter(a=>a.estado==='Completado').length;
      const enProcesoPOA=actsDelPlan.filter(a=>a.estado==='En Proceso').length;
      const canceladasPOA=actsDelPlan.filter(a=>a.estado==='Cancelada').length;
      const programadasPOA=actsDelPlan.filter(a=>a.estado==='Programada').length;

      return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.5rem'}}>
        {/* Semáforo Indicadores */}
        <div style={{background:'white',borderRadius:'12px',padding:'1.25rem',border:'2px solid #E5E7EB'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
            <div>
              <p style={{margin:0,fontSize:'0.75rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'0.05em'}}>Consolidado Indicadores</p>
              <p style={{margin:'0.15rem 0 0 0',fontSize:'0.8rem',color:'#6B7280'}}>{periodoLabel} · {totalInd} con seguimiento</p>
            </div>
          </div>
          {totalInd>0?(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
            {/* Por conteo */}
            <div style={{background:clIndConteo.bg,borderRadius:'8px',padding:'0.75rem',border:`1px solid ${clIndConteo.borde}`}}>
              <p style={{margin:'0 0 0.25rem 0',fontSize:'0.7rem',fontWeight:700,color:clIndConteo.c,textTransform:'uppercase'}}>Por conteo</p>
              <div style={{display:'flex',alignItems:'baseline',gap:'0.3rem',marginBottom:'0.3rem'}}>
                <span style={{fontSize:'1.8rem',fontWeight:800,color:clIndConteo.c,lineHeight:1}}>{pctIndConteo}%</span>
                <span style={{fontSize:'0.75rem',fontWeight:700,color:clIndConteo.c}}>{clIndConteo.icon} {clIndConteo.label}</span>
              </div>
              <div style={{width:'100%',height:'5px',background:'rgba(0,0,0,0.1)',borderRadius:'3px',marginBottom:'0.4rem'}}>
                <div style={{width:Math.min(pctIndConteo,100)+'%',height:'100%',background:clIndConteo.c,borderRadius:'3px'}}></div>
              </div>
              <p style={{margin:0,fontSize:'0.7rem',color:clIndConteo.c}}>🟢 {optimosInd} · 🟡 {precaucionInd} · 🔴 {criticosInd}</p>
            </div>
            {/* Por rendimiento */}
            <div style={{background:clIndRend.bg,borderRadius:'8px',padding:'0.75rem',border:`1px solid ${clIndRend.borde}`}}>
              <p style={{margin:'0 0 0.25rem 0',fontSize:'0.7rem',fontWeight:700,color:clIndRend.c,textTransform:'uppercase'}}>Por rendimiento</p>
              <div style={{display:'flex',alignItems:'baseline',gap:'0.3rem',marginBottom:'0.3rem'}}>
                <span style={{fontSize:'1.8rem',fontWeight:800,color:clIndRend.c,lineHeight:1}}>{pctIndRend}%</span>
                <span style={{fontSize:'0.75rem',fontWeight:700,color:clIndRend.c}}>{clIndRend.icon} {clIndRend.label}</span>
              </div>
              <div style={{width:'100%',height:'5px',background:'rgba(0,0,0,0.1)',borderRadius:'3px',marginBottom:'0.4rem'}}>
                <div style={{width:Math.min(pctIndRend,100)+'%',height:'100%',background:clIndRend.c,borderRadius:'3px'}}></div>
              </div>
              <p style={{margin:0,fontSize:'0.7rem',color:clIndRend.c}}>Promedio de rendimiento individual</p>
            </div>
          </div>):<p style={{margin:0,fontSize:'0.85rem',color:'#6B7280',textAlign:'center',padding:'1rem 0'}}>Sin registros en este período</p>}
        </div>

        {/* Semáforo POA */}
        <div style={{background:clPOA.bg,borderRadius:'12px',padding:'1.25rem',border:`2px solid ${clPOA.borde}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.75rem'}}>
            <div>
              <p style={{margin:0,fontSize:'0.75rem',fontWeight:700,color:clPOA.c,textTransform:'uppercase',letterSpacing:'0.05em'}}>Consolidado POA</p>
              <p style={{margin:'0.15rem 0 0 0',fontSize:'0.8rem',color:clPOA.c,opacity:0.8}}>{planActivo?planActivo.nombre+' '+planActivo.anio:'Sin plan activo'}</p>
            </div>
            <span style={{fontSize:'2.5rem',lineHeight:1}}>{clPOA.icon}</span>
          </div>
          <div style={{display:'flex',alignItems:'baseline',gap:'0.5rem',marginBottom:'0.5rem'}}>
            <span style={{fontSize:'3rem',fontWeight:800,color:clPOA.c,lineHeight:1}}>{pctPOA}%</span>
            <span style={{fontSize:'0.9rem',fontWeight:700,color:clPOA.c}}>{clPOA.label}</span>
          </div>
          <div style={{width:'100%',height:'6px',background:'rgba(0,0,0,0.1)',borderRadius:'3px',marginBottom:'0.75rem'}}>
            <div style={{width:pctPOA+'%',height:'100%',background:clPOA.c,borderRadius:'3px'}}></div>
          </div>
          {actsDelPlan.length>0?<div style={{display:'flex',gap:'0.75rem',fontSize:'0.78rem',color:clPOA.c,flexWrap:'wrap'}}>

            {canceladasPOA>0&&<span>❌ {canceladasPOA} canceladas</span>}
          </div>:<p style={{margin:0,fontSize:'0.8rem',color:clPOA.c}}>Sin actividades en el plan</p>}
        </div>
      </div>);
    })()}

    <div className="grid">
      <div className="stat-card"><div className="stat-label">Ejes</div><div className="stat-value">{ejes.length}</div></div>

const formatearTareas=(texto,limite=null)=>{
  if(!texto)return null;
  const lineas=texto.split('\n').filter(l=>l.trim());
  const tareas=lineas.map(l=>l.trim().replace(/^[-•*]\s*/,''));
  
  if(limite&&tareas.length>limite){
    const mostrar=tareas.slice(0,limite);
    const resto=tareas.length-limite;
    return(<div>
      {mostrar.map((t,i)=><div key={i} style={{fontSize:'0.85rem',color:'#6B7280',marginBottom:'0.15rem'}}>• {t}</div>)}
      <div style={{fontSize:'0.75rem',color:'#9CA3AF',marginTop:'0.25rem'}}>... (+{resto} más)</div>
    </div>);
  }
  
  return(<div>
    {tareas.map((t,i)=><div key={i} style={{fontSize:'0.85rem',color:'#6B7280',marginBottom:'0.25rem'}}>• {t}</div>)}
  </div>);
};

// ── Funciones globales de cálculo POA ──
const getMesesRango=(inicio,fin)=>{
  if(!inicio||!fin)return[];
  const meses=[];
  const nombresMes=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let [ay,am]=inicio.split('-').map(Number);
  const [fy,fm]=fin.split('-').map(Number);
  while(ay<fy||(ay===fy&&am<=fm)){
    meses.push({key:`${ay}-${String(am).padStart(2,'0')}`,label:`${nombresMes[am-1]} ${ay}`,anio:ay,mes:am});
    am++;if(am>12){am=1;ay++;}
  }
  return meses;
};
const calcAvanceActividad=(act)=>{
  if(act.estado==='Completada'||act.estado==='Completado')return 100;
  if(act.estado==='Cancelada'||act.estado==='Programada')return 0;
  const meses=getMesesRango(act.fechaInicio,act.fechaFin);
  if(meses.length===0)return 0;
  const porMes=100/meses.length;
  const registrados=(act.seguimientoMensual||{});
  const mesesConRegistro=meses.filter(m=>registrados[m.key]&&registrados[m.key].observacion).length;
  return Math.round(mesesConRegistro*porMes);
};
const calcAvancePOA=(acts)=>{
  if(acts.length===0)return 0;
  const suma=acts.reduce((acc,a)=>acc+calcAvanceActividad(a),0);
  return Math.round(suma/acts.length);
};

      style={{padding:'0.35rem 0.6rem',background:'#3B82F6',color:'white',border:'none',borderRadius:'4px',cursor:'pointer',fontSize:'0.8rem',fontWeight:600}}>
      ✓
    </button>
  </div>);
};

const VistaPlanOperativo=({user,entidad,datos,isAdmin,isMonitoreo})=>{
  const[vista,setVista]=useState('planes');
  const[planSel,setPlanSel]=useState(null);
  const[planes,setPlanes]=useState([]);
  const[actividades,setActividades]=useState([]);
  const[modalPlan,setModalPlan]=useState(false);
  const[modalActividad,setModalActividad]=useState(false);
  const[modalSeguimiento,setModalSeguimiento]=useState(null);
  const[modalScore,setModalScore]=useState(false);
  const[todasActividades,setTodasActividades]=useState([]);
  const[formPlan,setFormPlan]=useState({});
  const[formActividad,setFormActividad]=useState({});
  const[itemEdit,setItemEdit]=useState(null);
  const[loading,setLoading]=useState(false);
  const[busquedaPOA,setBusquedaPOA]=useState('');
  const planesFiltrados=planes.filter(p=>p.nombre.toLowerCase().includes(busquedaPOA.toLowerCase()));
  
  
  
  useEffect(()=>{
    if(!entidad)return;
    const unsub=db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      setTodasActividades(d);
    });
    return()=>unsub();
  },[entidad]);
  useEffect(()=>{
    if(!entidad)return;
    const unsub=db.collection('fundacoofisam_datos').doc(entidad.id).collection('planes_operativos').onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      d.sort((a,b)=>(b.anio||0)-(a.anio||0));
      setPlanes(d);
    });
    return()=>unsub();
  },[entidad]);
  
  useEffect(()=>{
    if(!entidad||!planSel)return;
    const unsub=db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').where('planId','==',planSel.id).onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      d.sort((a,b)=>(a.fechaInicio||'').localeCompare(b.fechaInicio||''));
      setActividades(d);
    });
    return()=>unsub();
  },[entidad,planSel]);
  
  if(!entidad||!datos)return <div className="empty-state"><h3>Selecciona una entidad</h3></div>;
  const{ejes=[],objetivos=[]}=datos;
  
  const guardarPlan=async(e)=>{
    e.preventDefault();setLoading(true);
    try{
      const ref=db.collection('fundacoofisam_datos').doc(entidad.id).collection('planes_operativos');
      const data={...formPlan,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
      if(itemEdit){
        await ref.doc(itemEdit.id).update(data);
      }else{
        await ref.add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }
      setModalPlan(false);setFormPlan({});setItemEdit(null);
    }catch(err){alert('Error: '+err.message);}
    finally{setLoading(false);}
  };
  
  const eliminarPlan=async(id)=>{
    if(!window.confirm('¿Eliminar plan y todas sus actividades?'))return;
    const batch=db.batch();
    batch.delete(db.collection('fundacoofisam_datos').doc(entidad.id).collection('planes_operativos').doc(id));
    const acts=await db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').where('planId','==',id).get();
    acts.forEach(doc=>batch.delete(doc.ref));
    await batch.commit();
  };
  
  const guardarActividad=async(e)=>{
    e.preventDefault();setLoading(true);
    try{
      const ref=db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades');
      const data={
        ...formActividad,
        planId:planSel.id,
        estado:formActividad.estado||'Programada',
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      if(itemEdit){
        await ref.doc(itemEdit.id).update(data);
      }else{
        await ref.add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }
      setModalActividad(false);setFormActividad({});setItemEdit(null);
    }catch(err){alert('Error: '+err.message);}
    finally{setLoading(false);}
  };
  
  const eliminarActividad=async(id)=>{
    if(!window.confirm('¿Eliminar?'))return;
    await db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').doc(id).delete();
  };
  
  const guardarSeguimiento=async(e)=>{
    e.preventDefault();setLoading(true);
    try{
      const updateData={
        estado:modalSeguimiento.estado,
        observacionesSeguimiento:modalSeguimiento.observacionesSeguimiento,
        fechaCambioEstado:new Date().toISOString().split('T')[0]
      };
      if(modalSeguimiento.estado==='Reprogramado'){
        if(!modalSeguimiento.fechaReprogramada){alert('Debes ingresar la nueva fecha reprogramada.');setLoading(false);return;}
        updateData.fechaReprogramada=modalSeguimiento.fechaReprogramada;
        updateData.historialReprogramaciones=firebase.firestore.FieldValue.arrayUnion({
          fecha:new Date().toISOString().split('T')[0],
          nuevaFecha:modalSeguimiento.fechaReprogramada,
          motivo:modalSeguimiento.observacionesSeguimiento||''
        });
      }
      if(modalSeguimiento.estado==='Cancelada'){
        if(!modalSeguimiento.observacionesSeguimiento){alert('Debes ingresar el motivo de cancelación.');setLoading(false);return;}
      }
      await db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').doc(modalSeguimiento.id).update(updateData);
      setModalSeguimiento(null);
    }catch(err){alert('Error: '+err.message);}
    finally{setLoading(false);}
  };
  
  const estadoColor={
    'Programada':{bg:'#FEF3C7',c:'#92400E'},
    'En Proceso':{bg:'#DBEAFE',c:'#1E40AF'},
    'Completado':{bg:'#D1FAE5',c:'#065F46'},
    'Reprogramado':{bg:'#FEE2E2',c:'#991B1B'},
    'Cancelada':{bg:'#F3F4F6',c:'#374151'}
  };

  const guardarSeguimientoMensual=async(act,mesKey,observacion)=>{
    if(!observacion.trim())return;
    try{
      const update={};
      update[`seguimientoMensual.${mesKey}.observacion`]=observacion;
      update[`seguimientoMensual.${mesKey}.fecha`]=new Date().toISOString().split('T')[0];
      if(act.estado==='Programada'){update.estado='En Proceso';update.fechaCambioEstado=new Date().toISOString().split('T')[0];}
      await db.collection('fundacoofisam_datos').doc(entidad.id).collection('poa_actividades').doc(act.id).update(update);
    }catch(err){alert('Error: '+err.message);}
  };

  // Funciones de cálculo disponibles globalmente (getMesesRango, calcAvanceActividad, calcAvancePOA)
  
  return(<div>
    <div className="page-header">
      <h1>🗓️ Plan Operativo Anual</h1>
      {!planSel?
        <button className="btn-primary" style={{width:'auto'}} onClick={()=>{setFormPlan({anio:new Date().getFullYear().toString()});setItemEdit(null);setModalPlan(true);}} disabled={!isAdmin||isMonitoreo} style={{display:isMonitoreo?'none':''}}>+ Nuevo POA</button>
      :
        <div style={{display:'flex',gap:'0.5rem'}}>
          <button className={`btn-${vista==='actividades'?'primary':'secondary'}`} onClick={()=>setVista('actividades')} style={{width:'auto'}}>📋 Actividades</button>
          <button className={`btn-${vista==='seguimiento'?'primary':'secondary'}`} onClick={()=>setVista('seguimiento')} style={{width:'auto'}}>✅ Seguimiento</button>
          <button className="btn-primary" onClick={()=>setModalScore(true)} style={{width:'auto',background:'#059669'}}>📊 Avance</button>
          <button className="btn-secondary" onClick={()=>{setPlanSel(null);setVista('planes');}} style={{width:'auto'}}>← Volver</button>
        </div>
      }
    </div>
    
    {!planSel?
    <div>
      <div className="card">
        <div style={{marginBottom:'1rem'}}>
          <input 
            type="text" 
            placeholder="🔍 Buscar plan por nombre..." 
            value={busquedaPOA} 
            onChange={e=>setBusquedaPOA(e.target.value)}
            style={{width:'100%',padding:'0.75rem',border:'1px solid #D1D5DB',borderRadius:'8px',fontSize:'0.95rem'}}
          />
        </div>
        <h3>Planes Operativos ({planesFiltrados.length})</h3>
        {planesFiltrados.length===0?<p style={{color:'#9CA3AF'}}>No hay planes. Crea el primero.</p>:
        <div style={{display:'grid',gap:'1rem'}}>
          {planesFiltrados.map(plan=>{
            const actsPlan=todasActividades.filter(a=>a.planId===plan.id);
            const avance=calcAvancePOA(actsPlan);
            const objs=objetivos.filter(o=>(plan.objetivosIds||[]).includes(o.id));
            return(<div key={plan.id} className="card" style={{padding:'1rem',background:'#F9FAFB',cursor:'pointer'}} onClick={()=>{setPlanSel(plan);setVista('actividades');}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <h4 style={{margin:'0 0 0.5rem 0',color:'#111827'}}>{plan.nombre}</h4>
                  <p style={{margin:'0.25rem 0',fontSize:'0.85rem',color:'#6B7280'}}>📅 Año: {plan.anio}</p>
                  <p style={{margin:'0.25rem 0',fontSize:'0.85rem',color:'#6B7280'}}>🎯 Objetivos: {objs.length}</p>
                  <div style={{marginTop:'0.5rem'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.25rem'}}>
                      <span style={{fontSize:'0.8rem',color:'#6B7280'}}>Avance:</span>
                      <span style={{fontSize:'0.85rem',fontWeight:700,color:avance>=100?'#059669':avance>=50?'#F59E0B':'#DC2626'}}>{avance}%</span>
                    </div>
                    <div style={{width:'100%',height:'6px',background:'#E5E7EB',borderRadius:'3px'}}>
                      <div style={{width:avance+'%',height:'100%',background:avance>=100?'#059669':avance>=50?'#F59E0B':'#DC2626'}}></div>
                    </div>
                  </div>
                  {objs.length>0&&<div style={{marginTop:'0.5rem',display:'flex',flexWrap:'wrap',gap:'0.25rem'}}>
                    {objs.map(obj=><span key={obj.id} style={{fontSize:'0.75rem',padding:'0.25rem 0.5rem',background:'#EEF2FF',color:'#4F46E5',borderRadius:'4px'}}>{obj.nombre}</span>)}
                  </div>}
                  {plan.descripcion&&<p style={{margin:'0.5rem 0 0 0',fontSize:'0.85rem',color:'#6B7280',fontStyle:'italic'}}>"{plan.descripcion}"</p>}
                </div>
                <div style={{display:'flex',gap:'0.3rem'}} onClick={e=>e.stopPropagation()}>
                  <button className="btn-edit" onClick={()=>{setFormPlan(plan);setItemEdit(plan);setModalPlan(true);}} style={{padding:'0.3rem 0.5rem',fontSize:'0.75rem'}}>✏️</button>
                  <button className="btn-secondary" onClick={()=>eliminarPlan(plan.id)} style={{padding:'0.3rem 0.5rem',fontSize:'0.75rem'}}>🗑️</button>
                </div>
              </div>
            </div>);
          })}
        </div>}
      </div>
    </div>
    :
    <div>
      <div className="card" style={{marginBottom:'1rem',background:'#EEF2FF'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h3 style={{margin:'0 0 0.25rem 0',color:'#4F46E5'}}>{planSel.nombre}</h3>
            <p style={{margin:0,fontSize:'0.85rem',color:'#6B7280'}}>📅 {planSel.anio} • 🎯 {(planSel.objetivosIds||[]).length} objetivos • 📝 {actividades.length} actividades</p>
          </div>
        </div>
      </div>
      
      {vista==='actividades'?
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <h3>Actividades ({actividades.length})</h3>
          <button className="btn-primary" style={{width:'auto'}} onClick={()=>{setFormActividad({});setItemEdit(null);setModalActividad(true);}}>+ Nueva Actividad</button>
        </div>
        {actividades.length===0?<p style={{color:'#9CA3AF'}}>Sin actividades</p>:
        <table className="tabla">
          <thead>
            <tr>
              <th>Actividad</th>
              <th>Tarea</th>
              <th>Responsable</th>
              <th>Fechas</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {actividades.map(act=>{
              const ec=estadoColor[act.estado]||estadoColor['Programada'];
              return(<tr key={act.id}>
                <td><strong>{act.actividad}</strong></td>
                <td>{act.tarea?formatearTareas(act.tarea,3):<span style={{color:'#9CA3AF',fontSize:'0.85rem'}}>-</span>}</td>
                <td>{act.responsable}</td>
                <td style={{fontSize:'0.8rem'}}>{act.fechaInicio} → {act.fechaFin||''}</td>
                <td><span style={{padding:'0.25rem 0.5rem',borderRadius:'6px',fontSize:'0.75rem',fontWeight:600,background:ec.bg,color:ec.c}}>{act.estado}</span></td>
                <td>
                  <div style={{display:'flex',gap:'0.3rem'}}>
                    <button className="btn-edit" onClick={()=>{setFormActividad(act);setItemEdit(act);setModalActividad(true);}} style={{padding:'0.3rem 0.5rem',fontSize:'0.75rem'}}>✏️</button>
                    <button className="btn-secondary" onClick={()=>eliminarActividad(act.id)} style={{padding:'0.3rem 0.5rem',fontSize:'0.75rem'}}>🗑️</button>
                  </div>
                </td>
              </tr>);
            })}
          </tbody>
        </table>}
      </div>
      :
      <div className="card">
        <h3>Seguimiento de Actividades</h3>
        {actividades.length===0?<p style={{color:'#9CA3AF'}}>Sin actividades</p>:
        <div style={{display:'grid',gap:'1rem'}}>
          {actividades.map(act=>{
            const ec=estadoColor[act.estado]||estadoColor['Programada'];
            return(<div key={act.id} className="card" style={{padding:'1rem',background:'#F9FAFB'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.5rem'}}>
                <div style={{flex:1}}>
                  <h4 style={{margin:'0 0 0.5rem 0',color:'#111827'}}>{act.actividad}</h4>
                  {act.tarea&&formatearTareasCheckbox(act.tarea)}
                  <p style={{margin:'0.25rem 0',fontSize:'0.85rem',color:'#6B7280'}}>👤 {act.responsable}</p>
                  <p style={{margin:'0.25rem 0',fontSize:'0.85rem',color:'#6B7280'}}>📅 {act.fechaInicio} → {act.fechaFin||'-'}</p>
                  {act.observaciones&&<p style={{margin:'0.5rem 0',fontSize:'0.85rem',padding:'0.5rem',background:'white',borderRadius:'4px',borderLeft:'3px solid #4F46E5'}}>📝 {act.observaciones}</p>}
                  {act.observacionesSeguimiento&&<p style={{margin:'0.5rem 0',fontSize:'0.85rem',padding:'0.5rem',background:'#FEF3C7',borderRadius:'4px',borderLeft:'3px solid #F59E0B'}}>💬 Seguimiento: {act.observacionesSeguimiento}</p>}
                  {act.estado==='Reprogramado'&&act.fechaReprogramada&&<p style={{margin:'0.5rem 0',fontSize:'0.85rem',padding:'0.5rem',background:'#FEE2E2',borderRadius:'4px',borderLeft:'3px solid #DC2626',fontWeight:600}}>🔁 Reprogramada al: {act.fechaReprogramada}</p>}
                  {act.historialReprogramaciones&&act.historialReprogramaciones.length>0&&<details style={{margin:'0.5rem 0',fontSize:'0.8rem'}}><summary style={{cursor:'pointer',color:'#DC2626',fontWeight:600}}>📋 Historial de reprogramaciones ({act.historialReprogramaciones.length})</summary><div style={{marginTop:'0.5rem',paddingLeft:'0.5rem'}}>{act.historialReprogramaciones.map((r,i)=><div key={i} style={{padding:'0.35rem 0',borderBottom:'1px solid #FEE2E2',color:'#6B7280'}}>• {r.fecha} → nueva fecha: <strong>{r.nuevaFecha}</strong>{r.motivo&&<span> — {r.motivo}</span>}</div>)}</div></details>}
                </div>
                <span style={{padding:'0.5rem 0.75rem',borderRadius:'6px',fontWeight:700,fontSize:'0.85rem',background:ec.bg,color:ec.c,whiteSpace:'nowrap'}}>{act.estado}</span>
              </div>
              {(()=>{
                const avAct=calcAvanceActividad(act);
                const mesesAct=getMesesRango(act.fechaInicio,act.fechaFin);
                const segMens=act.seguimientoMensual||{};
                return(<div style={{marginTop:'0.75rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.25rem'}}>
                    <span style={{fontSize:'0.8rem',color:'#6B7280',fontWeight:600}}>Avance:</span>
                    <span style={{fontSize:'0.9rem',fontWeight:700,color:avAct>=100?'#059669':avAct>=50?'#F59E0B':'#DC2626'}}>{avAct}%</span>
                  </div>
                  <div style={{width:'100%',height:'8px',background:'#E5E7EB',borderRadius:'4px',marginBottom:'0.75rem'}}>
                    <div style={{width:avAct+'%',height:'100%',background:avAct>=100?'#059669':avAct>=50?'#F59E0B':'#DC2626',borderRadius:'4px'}}></div>
                  </div>
                  {act.estado==='En Proceso'&&mesesAct.length>0&&(
                    <details style={{marginBottom:'0.75rem'}}>
                      <summary style={{cursor:'pointer',fontSize:'0.85rem',fontWeight:600,color:'#1E40AF',padding:'0.4rem 0',userSelect:'none'}}>
                        📅 Seguimiento mensual ({mesesAct.filter(m=>segMens[m.key]?.observacion).length}/{mesesAct.length} meses registrados)
                      </summary>
                      <div style={{marginTop:'0.5rem',display:'grid',gap:'0.5rem'}}>
                        {mesesAct.map(m=>{
                          const reg=segMens[m.key];
                          return(<div key={m.key} style={{padding:'0.6rem',background:reg?.observacion?'#EFF6FF':'#F9FAFB',borderRadius:'6px',border:`1px solid ${reg?.observacion?'#BFDBFE':'#E5E7EB'}`}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.35rem'}}>
                              <span style={{fontSize:'0.8rem',fontWeight:700,color:'#1E40AF'}}>{m.label}</span>
                              <span style={{fontSize:'0.7rem',color:reg?.observacion?'#059669':'#9CA3AF',fontWeight:600}}>{reg?.observacion?'✅ Registrado':'⬜ Pendiente'}</span>
                            </div>
                            {reg?.observacion?
                              <p style={{margin:0,fontSize:'0.8rem',color:'#374151'}}>{reg.observacion}</p>
                              :<SeguimientoMesInput act={act} mesKey={m.key} onGuardar={guardarSeguimientoMensual}/>
                            }
                          </div>);
                        })}
                      </div>
                    </details>
                  )}
                </div>);
              })()}
              <div style={{display:'flex',gap:'0.5rem',marginTop:'0.5rem',paddingTop:'1rem',borderTop:'1px solid #E5E7EB',flexWrap:'wrap'}}>
                <button onClick={()=>setModalSeguimiento({...act,estado:'Programada'})} style={{padding:'0.4rem 0.75rem',fontSize:'0.85rem',background:act.estado==='Programada'?'#FEF3C7':'white',border:'1px solid #F59E0B',borderRadius:'6px',cursor:'pointer',fontWeight:act.estado==='Programada'?700:400}}>📋 Programada</button>
                <button onClick={()=>setModalSeguimiento({...act,estado:'En Proceso'})} style={{padding:'0.4rem 0.75rem',fontSize:'0.85rem',background:act.estado==='En Proceso'?'#DBEAFE':'white',border:'1px solid #3B82F6',borderRadius:'6px',cursor:'pointer',fontWeight:act.estado==='En Proceso'?700:400}}>🔄 En Proceso</button>
                <button onClick={()=>setModalSeguimiento({...act,estado:'Completado'})} style={{padding:'0.4rem 0.75rem',fontSize:'0.85rem',background:act.estado==='Completado'?'#D1FAE5':'white',border:'1px solid #059669',borderRadius:'6px',cursor:'pointer',fontWeight:act.estado==='Completado'?700:400}}>✅ Completado</button>
                <button onClick={()=>setModalSeguimiento({...act,estado:'Reprogramado'})} style={{padding:'0.4rem 0.75rem',fontSize:'0.85rem',background:act.estado==='Reprogramado'?'#FEE2E2':'white',border:'1px solid #DC2626',borderRadius:'6px',cursor:'pointer',fontWeight:act.estado==='Reprogramado'?700:400}}>🔁 Reprogramar</button>
                <button onClick={()=>setModalSeguimiento({...act,estado:'Cancelada'})} style={{padding:'0.4rem 0.75rem',fontSize:'0.85rem',background:act.estado==='Cancelada'?'#F3F4F6':'white',border:'1px solid #6B7280',borderRadius:'6px',cursor:'pointer',fontWeight:act.estado==='Cancelada'?700:400}}>❌ Cancelar</button>
              </div>
            </div>);
          })}
        </div>}
      </div>}
    </div>}
    
    {modalPlan&&<div className="modal-overlay" onClick={()=>{setModalPlan(false);setItemEdit(null);}}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:'700px'}}>
        <div className="modal-header">
          <h2>{itemEdit?'✏️ Editar':'📝 Nuevo'} Plan Operativo</h2>
          <button className="btn-cerrar" onClick={()=>{setModalPlan(false);setItemEdit(null);}}>×</button>
        </div>
        <div className="modal-body">
          <form onSubmit={guardarPlan}>
            <div className="form-group">
              <label>Nombre del POA *</label>
              <input type="text" value={formPlan.nombre||''} onChange={e=>setFormPlan({...formPlan,nombre:e.target.value})} required placeholder="Ej: POA 2025"/>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Año *</label>
                <select value={formPlan.anio||''} onChange={e=>setFormPlan({...formPlan,anio:e.target.value})} required>
                  <option value="">Seleccionar...</option>
                  {['2024','2025','2026','2027','2028'].map(a=><option key={a} value={a}>{a}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group">
              <label>Objetivos Estratégicos *</label>
              <div style={{border:'1px solid #E5E7EB',borderRadius:'6px',padding:'0.5rem',maxHeight:'200px',overflow:'auto'}}>
                {objetivos.length===0?<p style={{color:'#9CA3AF',fontSize:'0.85rem',margin:0}}>No hay objetivos</p>:
                objetivos.map(obj=>{
                  const eje=ejes.find(e=>e.id===obj.ejeId);
                  return(<label key={obj.id} style={{display:'block',padding:'0.25rem',cursor:'pointer'}}>
                    <input type="checkbox" checked={(formPlan.objetivosIds||[]).includes(obj.id)} onChange={e=>{
                      const ids=formPlan.objetivosIds||[];
                      setFormPlan({...formPlan,objetivosIds:e.target.checked?[...ids,obj.id]:ids.filter(i=>i!==obj.id)});

const HistorialSeguimiento=({seguimientos,indicador,scoreIcon,onEditar,onEliminar})=>{
  const[anioHist,setAnioHist]=useState('');
  const aniosHist=[...new Set(seguimientos.map(s=>String(s.anio)))].sort((a,b)=>b-a);
  const segsFilt=anioHist?seguimientos.filter(s=>String(s.anio)===anioHist):seguimientos;
  return(<div className="card">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
      <h3 style={{margin:0}}>Historial de Registros</h3>
      {aniosHist.length>1&&<div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
        <label style={{fontSize:'0.85rem',fontWeight:600,color:'#6B7280'}}>Año:</label>
        <select value={anioHist} onChange={e=>setAnioHist(e.target.value)}
          style={{padding:'0.3rem 0.5rem',border:'1px solid #E5E7EB',borderRadius:'6px',fontSize:'0.85rem'}}>
          <option value="">Todos</option>
          {aniosHist.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        {anioHist&&<button onClick={()=>setAnioHist('')} style={{padding:'0.3rem 0.5rem',border:'1px solid #E5E7EB',borderRadius:'6px',background:'white',cursor:'pointer',fontSize:'0.8rem'}}>✕</button>}
      </div>}
    </div>
    {segsFilt.length===0
      ?<div className="empty-state" style={{padding:'1.5rem'}}><p>No hay registros{anioHist?' para '+anioHist:''}.</p></div>
      :<div style={{overflowX:'auto'}}>
        {indicador?.tipoMeta==='acumulativa'&&(()=>{
          const total=segsFilt.reduce((acc,s)=>acc+parseFloat(s.avance||0),0);
          return(<div style={{background:'#EEF2FF',padding:'1rem',borderRadius:'8px',marginBottom:'1rem',border:'2px solid #C7D2FE'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:'0.9rem',color:'#6B7280',fontWeight:600}}>TOTAL ACUMULADO{anioHist?' '+anioHist:''}</span>
              <div style={{fontSize:'1.8rem',fontWeight:'bold',color:'#4F46E5'}}>📈 {total.toFixed(2)} {indicador.unidad}</div>
            </div>
          </div>);
        })()}
        <table className="tabla">
          <thead><tr><th>Período</th><th>Meta Anual</th><th>Meta Mes</th><th>Avance</th><th>Rendimiento</th><th>Score</th><th>Obs.</th><th>Acciones</th></tr></thead>
          <tbody>{segsFilt.map(seg=>(
            <tr key={seg.id}>
              <td><strong>{seg.mes} {seg.anio}</strong></td>
              <td>{indicador.meta||seg.metaAnual} {indicador.unidad}</td>
              <td>{seg.metaMes} {indicador.unidad}</td>
              <td>{seg.avance} {indicador.unidad}</td>
              <td><strong>{seg.rendimiento?.toFixed(2)}%</strong></td>
              <td><div className={'semaforo '+(seg.score||'sin_meta')}>{scoreIcon[seg.score||'sin_meta']}</div></td>
              <td style={{maxWidth:'120px',fontSize:'0.8rem',color:'#6B7280'}}>{seg.observaciones}</td>
              <td><div style={{display:'flex',gap:'0.3rem'}}>
                <button className="btn-edit" onClick={()=>onEditar(seg)}>✏️</button>

              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </div>}
  </div>);
};

const VistaSeguimiento=({user,entidad,datos,isMonitoreo})=>{
  const[indicadorSel,setIndicadorSel]=useState(null);
  const[busquedaSeg,setBusquedaSeg]=useState('');
  const[ejeSel,setEjeSel]=useState('');
  const[objetivoSel,setObjetivoSel]=useState('');
  const[segEdit,setSegEdit]=useState(null);
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[loading,setLoading]=useState(false);
  const[busquedaPOA,setBusquedaPOA]=useState('');
  const[seguimientos,setSeguimientos]=useState([]);

  useEffect(()=>{
    if(!entidad||!indicadorSel)return;
    const ref=db.collection('fundacoofisam_datos').doc(entidad.id).collection('seguimientos');
    const unsub=ref.where('indicadorId','==',indicadorSel).onSnapshot(s=>{
      const d=[];s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      d.sort((a,b)=>{const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre','Semestral 1','Semestral 2','Anual'];return(a.anio-b.anio)||meses.indexOf(a.mes)-meses.indexOf(b.mes);});
      setSeguimientos(d);
    });
    return()=>unsub();
  },[entidad,indicadorSel]);

  if(!entidad||!datos)return <div className="empty-state"><h3>Selecciona entidad</h3></div>;
  const{ejes=[],objetivos=[],indicadores=[]}=datos;
  const indicador=indicadores.find(i=>i.id===indicadorSel);

  const scoreConfig=entidad?.scoreConfig||{critico:{min:0,max:60},precaucion:{min:61,max:85},optimo:{min:86,max:100}};
  const calcScore=(avance,metaMes,tipo)=>{
    if(!metaMes||metaMes===0)return'sin_meta';
    const r=(avance/metaMes)*100;
    if(tipo==='descendente'){
      // Descendente: cumple si avance <= meta (r<=100 es óptimo)
      const inv=r===0?100:Math.min((metaMes/avance)*100,200);
      if(inv>=scoreConfig.optimo.min)return'optimo';
      if(inv>=scoreConfig.precaucion.min)return'precaucion';
      return'critico';
    }
    // Ascendente: usar rangos de scoreConfig de la entidad
    if(r>=scoreConfig.optimo.min)return'optimo';
    if(r>=scoreConfig.precaucion.min)return'precaucion';
    return'critico';
  };

  const guardar=async(e)=>{
    e.preventDefault();setLoading(true);
    try{
      const metaMes=parseFloat(form.metaMes||0);
      const avance=parseFloat(form.avance||0);
      const metaAnual=parseFloat(form.metaAnual||indicador?.meta||0);
      // Rendimiento: ascendente = avance/meta*100, descendente = meta/avance*100 (menor es mejor)
      const rendimiento=metaMes>0
        ?(indicador?.tipo==='descendente'
          ?(avance===0?100:Math.min((metaMes/avance)*100,200))
          :(avance/metaMes)*100)
        :0;
      const score=calcScore(avance,metaMes,indicador?.tipo);
      const data={...form,metaMes,avance,metaAnual,rendimiento,score,indicadorId:indicadorSel};
      const ref=db.collection('fundacoofisam_datos').doc(entidad.id).collection('seguimientos');
      if(segEdit){await ref.doc(segEdit.id).update(data);}
      else{await ref.add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});}
      setModal(false);setForm({});setSegEdit(null);
    }catch(err){alert('Error: '+err.message);}
    finally{setLoading(false);}
  };

  const editarSeg=(s)=>{setSegEdit(s);setForm({...s});setModal(true);};

  const eliminarSeg=async(id)=>{
    if(!window.confirm('¿Eliminar este registro de seguimiento?'))return;
    await db.collection('fundacoofisam_datos').doc(entidad.id).collection('seguimientos').doc(id).delete();
  };

  const scoreColor={optimo:'#D1FAE5',precaucion:'#FEF3C7',critico:'#FEE2E2',sin_meta:'#F3F4F6'};
  const scoreIcon={optimo:'🟢',precaucion:'🟡',critico:'🔴',sin_meta:'⚪'};
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre','Semestral 1','Semestral 2','Anual'];

  const objetivosPorEje=ejeSel?objetivos.filter(o=>o.ejeId===ejeSel):objetivos;
  const indicadoresFiltrados=indicadores.filter(i=>{
    const o=objetivos.find(x=>x.id===i.objetivoId);
    const ej=ejes.find(x=>x.id===o?.ejeId);
    if(ejeSel&&ej?.id!==ejeSel)return false;
    if(objetivoSel&&o?.id!==objetivoSel)return false;
    return(i.nombre+' '+(o?.nombre||'')+' '+(ej?.nombre||'')).toLowerCase().includes(busquedaSeg.toLowerCase());
  });

  return(<div>
    <div className="page-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <h1>📋 Seguimiento de Indicadores</h1>
      <div style={{display:"flex",gap:"0.5rem"}}>
        <button className="btn-primary print-btn" onClick={()=>window.print()} style={{width:"auto"}}>🖨️ Imprimir</button>
        {indicadorSel&&<button className="btn-primary" style={{width:'auto'}}
        onClick={()=>{setSegEdit(null);setForm({mes:meses[new Date().getMonth()],anio:new Date().getFullYear().toString(),avance:'',metaMes:'',metaAnual:indicador?.meta||'',observaciones:''});setModal(true);}}>
        {!isMonitoreo&&'+ Nuevo Registro'}{isMonitoreo&&'📊 Solo lectura'}
      </button>}
      </div>
    </div>
    <div className="card">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
        <div className="form-group" style={{margin:0}}>
          <label style={{fontSize:'0.85rem',fontWeight:600}}>Filtrar por Eje</label>
          <select value={ejeSel} onChange={e=>{setEjeSel(e.target.value);setObjetivoSel('');setIndicadorSel(null);}}
            style={{width:'100%',padding:'0.5rem',border:'2px solid #E5E7EB',borderRadius:'8px',fontSize:'0.9rem'}}>
            <option value="">Todos los ejes</option>
            {ejes.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
        </div>
        <div className="form-group" style={{margin:0}}>
          <label style={{fontSize:'0.85rem',fontWeight:600}}>Filtrar por Objetivo</label>
          <select value={objetivoSel} onChange={e=>{setObjetivoSel(e.target.value);setIndicadorSel(null);}}
            style={{width:'100%',padding:'0.5rem',border:'2px solid #E5E7EB',borderRadius:'8px',fontSize:'0.9rem'}}>
            <option value="">Todos los objetivos</option>
            {objetivosPorEje.map(o=>{
              const eje=ejes.find(e=>e.id===o.ejeId);
              return<option key={o.id} value={o.id}>{ejeSel?o.nombre:`[${eje?.nombre}] ${o.nombre}`}</option>;
            })}
          </select>
        </div>
      </div>
      <div className="form-group" style={{margin:0}}>
        <label style={{fontSize:'0.85rem',fontWeight:600}}>Buscar y seleccionar Indicador
          <span style={{marginLeft:'0.5rem',fontWeight:400,color:'#6B7280'}}>({indicadoresFiltrados.length} indicadores)</span>
          {(ejeSel||objetivoSel||busquedaSeg)&&<button onClick={()=>{setEjeSel('');setObjetivoSel('');setBusquedaSeg('');setIndicadorSel(null);}} style={{marginLeft:'0.75rem',padding:'0.15rem 0.5rem',border:'1px solid #E5E7EB',borderRadius:'4px',background:'white',cursor:'pointer',fontSize:'0.75rem',color:'#6B7280'}}>✕ Limpiar filtros</button>}
        </label>
        <input type="text" value={busquedaSeg} onChange={e=>setBusquedaSeg(e.target.value)} placeholder="Escribe para filtrar por nombre..." style={{marginBottom:'0.5rem'}}/>
        <select value={indicadorSel||''} onChange={e=>setIndicadorSel(e.target.value||null)}
          size={Math.min(8,indicadoresFiltrados.length+1)} style={{height:'auto',minHeight:'80px'}}>
          <option value="">-- Seleccionar indicador --</option>
          {indicadoresFiltrados.map(ind=>{
            const obj=objetivos.find(o=>o.id===ind.objetivoId);
            const eje=ejes.find(e=>e.id===obj?.ejeId);
            return<option key={ind.id} value={ind.id}>[{eje?.nombre}] {obj?.nombre?obj.nombre.substring(0,30)+'…':''} — {ind.nombre}</option>;
          })}
        </select>
      </div>
    </div>
    {!indicadorSel&&<div className="empty-state"><h3>Selecciona un indicador para ver su seguimiento</h3></div>}
    {indicador&&(<>
      <div className="card">
        <h3>{indicador.nombre}</h3>
        <p style={{color:'#6B7280',margin:'0.25rem 0'}}>{indicador.tipo==='ascendente'?'📈':'📉'} Meta anual: {indicador.meta} {indicador.unidad}</p>
        {indicador.metasPorAnio&&<div style={{fontSize:'0.8rem',color:'#4F46E5',marginTop:'0.5rem'}}>
          📅 Metas por año: {Object.entries(indicador.metasPorAnio).map(([a,m])=>a+': '+m).join(' | ')}
        </div>}
      </div>
      <HistorialSeguimiento
        seguimientos={seguimientos}
        indicador={indicador}
        scoreIcon={scoreIcon}
        onEditar={editarSeg}
        onEliminar={eliminarSeg}
      />
    </>)}
    {modal&&indicador&&(<div className="modal-overlay" onClick={()=>{setModal(false);setSegEdit(null);}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{segEdit?'✏️ Editar Registro':'Registrar Seguimiento'}</h2>
          <button className="btn-cerrar" onClick={()=>{setModal(false);setSegEdit(null);}}>×</button>
        </div>
        <div className="modal-body">
          <div style={{background:'#EEF2FF',padding:'0.5rem 0.75rem',borderRadius:'6px',marginBottom:'0.75rem',fontSize:'0.875rem',color:'#4F46E5'}}>
            {indicador.nombre}
          </div>
          <form onSubmit={guardar}>
            <div className="form-row">
              <div className="form-group">
                <label>Mes *</label>
                <select value={form.mes||''} onChange={e=>setForm({...form,mes:e.target.value})} required>
                  <option value="">Seleccionar...</option>
                  {meses.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Año *</label>
                <select value={form.anio||new Date().getFullYear()} onChange={e=>setForm({...form,anio:e.target.value})} required>
                  {['2024','2025','2026','2027','2028'].map(a=><option key={a} value={a}>{a}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Meta Anual ({indicador.unidad})</label>
                <input type="number" value={form.metaAnual||indicador.meta||''} onChange={e=>setForm({...form,metaAnual:e.target.value})}/>
              </div>
              <div className="form-group">
                <label>Meta del Mes ({indicador.unidad}) *</label>
                <input type="number" value={form.metaMes||''} onChange={e=>setForm({...form,metaMes:e.target.value})} required/>
              </div>
            </div>
            <div className="form-group">
              <label>Avance Real ({indicador.unidad}) *</label>
              <input type="number" value={form.avance||''} onChange={e=>setForm({...form,avance:e.target.value})} required/>
            </div>
            <div className="form-group">
              <label>Observaciones</label>
              <textarea value={form.observaciones||''} onChange={e=>setForm({...form,observaciones:e.target.value})} rows={3}/>
            </div>
            <button type="submit" className="btn-primary" disabled={loading}>
              {loading?'⏳...':(segEdit?'💾 Actualizar':'💾 Guardar Actividad')}
            </button>
          </form>
        </div>
      </div>
    </div>)}
  </div>);
};const VistaUsuarios=({user,userRol,entidad})=>{
  const[usuarios,setUsuarios]=useState([]);
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({email:'',password:'',rol:'seguimiento',nombre:''});
  const[usuarioEdit,setUsuarioEdit]=useState(null);
  const[loading,setLoading]=useState(false);
  const[busquedaPOA,setBusquedaPOA]=useState('');
  const[mensaje,setMensaje]=useState({texto:'',tipo:''});

  useEffect(()=>{
    if(!entidad)return;
    const unsub=db.collection('fundacoofisam_usuarios').onSnapshot(s=>{
      const d=[];
      s.forEach(doc=>d.push({id:doc.id,...doc.data()}));
      d.sort((a,b)=>(a.nombre||a.email).localeCompare(b.nombre||b.email));
      setUsuarios(d);
    });
    return()=>unsub();
  },[entidad]);

  const crearUsuario=async(e)=>{
    e.preventDefault();setLoading(true);setMensaje({texto:'',tipo:''});
    try{
      if(usuarioEdit){
        await db.collection('fundacoofisam_usuarios').doc(usuarioEdit.id).update({nombre:form.nombre||form.email,rol:form.rol});
        setMensaje({texto:'Actualizado.',tipo:'ok'});
        setModal(false);setForm({email:'',password:'',rol:'seguimiento',nombre:''});setUsuarioEdit(null);
        setLoading(false);return;
      }
      const existing=await db.collection('fundacoofisam_usuarios').where('email','==',form.email).get();
      if(!existing.empty){
        await existing.docs[0].ref.update({nombre:form.nombre||form.email,rol:form.rol});
        setMensaje({texto:'Usuario actualizado.',tipo:'ok'});
      }else{
        const _app=firebase.initializeApp(firebase.app().options,'sec'+Date.now());
        const _auth=_app.auth();
        const cred=await _auth.createUserWithEmailAndPassword(form.email,form.password);
        await db.collection('fundacoofisam_usuarios').doc(cred.user.uid).set({
          email:form.email,nombre:form.nombre||form.email,rol:form.rol,
          entidadId:'general',creadoPor:user.uid,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        await _auth.signOut();await _app.delete();
        setMensaje({texto:'Usuario creado.',tipo:'ok'});
      }
      setForm({email:'',password:'',rol:'seguimiento',nombre:''});
    }catch(err){setMensaje({texto:'Error: '+err.message,tipo:'error'});}
    finally{setLoading(false);}
  };

  const abrirEditar=(u)=>{
    setUsuarioEdit(u);
    setForm({email:u.email,nombre:u.nombre||'',rol:u.rol,password:''});
    setModal(true);
  };

  const cambiarRol=async(uid,nuevoRol)=>{
    await db.collection('fundacoofisam_usuarios').doc(uid).update({rol:nuevoRol});
  };

  const resetPassword=async(email)=>{
    try{
      await auth.sendPasswordResetEmail(email);
      setMensaje({texto:'Email de recuperacion enviado a '+email,tipo:'ok'});
      setTimeout(()=>setMensaje({texto:'',tipo:''}),5000);
    }catch(err){setMensaje({texto:'Error: '+err.message,tipo:'error'});}
  };

  const eliminarUsuario=async(uid,email)=>{
    if(!window.confirm('Eliminar usuario '+email+'?'))return;
    await db.collection('fundacoofisam_usuarios').doc(uid).delete();
  };

  const badges={admin:{bg:'#EEF2FF',color:'#4F46E5',label:'Admin'},seguimiento:{bg:'#F0FDF4',color:'#166534',label:'Seguimiento'}};

  return(<div>
    <div className="page-header">
      <h1>Usuarios</h1>
      <button className="btn-primary" style={{width:'auto'}}
        onClick={()=>{setUsuarioEdit(null);setForm({email:'',password:'',rol:'seguimiento',nombre:''});setModal(true);}}>
        + Nuevo Usuario
      </button>
    </div>
    {mensaje.texto&&<div className={mensaje.tipo==='ok'?'success-message':'error-message'}>{mensaje.texto}</div>}
    <div className="card">
      <table className="tabla">
        <thead><tr><th>Nombre / Email</th><th>Rol</th><th>Cambiar Rol</th><th>Acciones</th></tr></thead>
        <tbody>{usuarios.map(u=>{
          const b=badges[u.rol]||badges.seguimiento;
          const esTu=(u.id===user.uid);
          return(
            <tr key={u.id}>
              <td>
                <strong>{u.nombre||u.email}</strong>
                {esTu&&<span style={{marginLeft:'0.5rem',fontSize:'0.75rem',color:'#6B7280'}}>(Tu)</span>}
                <div style={{fontSize:'0.8rem',color:'#6B7280'}}>{u.email}</div>
              </td>
              <td><span style={{padding:'0.25rem 0.75rem',borderRadius:'12px',fontSize:'0.8rem',fontWeight:700,background:b.bg,color:b.color}}>{b.label}</span></td>
              <td>{!esTu&&(
                <select value={u.rol} onChange={e=>cambiarRol(u.id,e.target.value)}
                  style={{padding:'0.4rem 0.5rem',borderRadius:'6px',border:'2px solid #E5E7EB',fontSize:'0.875rem'}}>
                  <option value="admin">Admin</option>
                  <option value="seguimiento">Seguimiento</option>
                </select>
              )}</td>
              <td>{!esTu&&(
                <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
                  <button className="btn-edit" onClick={()=>abrirEditar(u)}>Editar</button>
                  <button style={{padding:'0.4rem 0.6rem',fontSize:'0.8rem',background:'#FEF3C7',color:'#92400E',border:'1px solid #F59E0B',borderRadius:'6px',cursor:'pointer'}}
                    onClick={()=>resetPassword(u.email)}>Reset Clave</button>
                  <button className="btn-secondary" style={{padding:'0.4rem 0.6rem',fontSize:'0.8rem'}}
                    onClick={()=>eliminarUsuario(u.id,u.email)}>Eliminar</button>
                </div>
              )}</td>
            </tr>
          );
        })}</tbody>
      </table>
    </div>
    {modal&&<div className="modal-overlay" onClick={()=>{setModal(false);setUsuarioEdit(null);}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{usuarioEdit?'Editar Usuario':'Nuevo Usuario'}</h2>
          <button className="btn-cerrar" onClick={()=>{setModal(false);setUsuarioEdit(null);setForm({email:'',password:'',rol:'seguimiento',nombre:''});}}>x</button>
        </div>
        <div className="modal-body">
          <form onSubmit={crearUsuario}>
            <div className="form-group">
              <label>Nombre</label>
              <input type="text" value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Nombre completo"/>
            </div>
            <div className="form-group">
              <label>Email</label>
              <input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}
                required placeholder="usuario@correo.com" readOnly={!!usuarioEdit}
                style={{background:usuarioEdit?'#F3F4F6':''}}/>
            </div>
            {!usuarioEdit&&<div className="form-group">
              <label>Contrasena</label>
              <input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}
                required placeholder="Minimo 6 caracteres" minLength={6}/>
            </div>}
            <div className="form-group">
              <label>Rol</label>
              <select value={form.rol} onChange={e=>setForm({...form,rol:e.target.value})}>
                <option value="admin">Admin - Control total</option>
                <option value="seguimiento">Seguimiento - Solo registrar avances</option>
              </select>
            </div>
            <button type="submit" className="btn-primary" disabled={loading}>
              {loading?'Espere...':(usuarioEdit?'Guardar Cambios':'Crear Usuario')}
            </button>
          </form>
        </div>
      </div>
    </div>}
  </div>);
};const ModalImpresionDashboard=({entidad,datos,onClose})=>{
  const{ejes=[],objetivos=[],indicadores=[],seguimientos=[]}=datos;
  return(<div className="modal-overlay"><div className="modal" style={{maxWidth:'900px',width:'95%',maxHeight:'90vh',overflow:'auto'}}>
    <div className="modal-header"><h2>Informe - {entidad.nombre}</h2>
      <div style={{display:'flex',gap:'0.5rem'}}>
        <button className="btn-primary" style={{width:'auto'}} onClick={()=>window.print()}>Imprimir</button>
        <button className="btn-cerrar" onClick={onClose}>x</button>
      </div>
    </div>
    <div className="modal-body">
      <h3>Resumen General</h3>
      <table className="tabla"><thead><tr><th>Eje</th><th>Objetivos</th><th>Indicadores</th><th>Con Seguimiento</th></tr></thead>
        <tbody>{ejes.map(eje=>{
          const objs=objetivos.filter(o=>o.ejeId===eje.id);
          const inds=indicadores.filter(i=>objs.some(o=>o.id===i.objetivoId));
          const conSeg=inds.filter(i=>seguimientos.some(s=>s.indicadorId===i.id));
          return<tr key={eje.id}><td>{eje.nombre}</td><td>{objs.length}</td><td>{inds.length}</td><td>{conSeg.length}</td></tr>;
        })}</tbody>
      </table>
      <h3 style={{marginTop:'1.5rem'}}>Detalle por Indicador</h3>
      <table className="tabla"><thead><tr><th>Indicador</th><th>Objetivo</th><th>Meta Anual</th><th>Ultimo Avance</th><th>Score</th></tr></thead>
        <tbody>{indicadores.map(ind=>{
          const obj=objetivos.find(o=>o.id===ind.objetivoId);
          const segs=seguimientos.filter(s=>s.indicadorId===ind.id);
          const ultimo=segs.length>0?segs[segs.length-1]:null;
          return<tr key={ind.id}>
            <td>{ind.nombre}</td><td>{obj?.nombre}</td>
            <td>{ind.meta} {ind.unidad}</td>
            <td>{ultimo?ultimo.avance+' '+ind.unidad:'-'}</td>
            <td>{ultimo?<div className={'semaforo '+(ultimo.score||'')} style={{display:'inline-block'}}>{ultimo.score==='critico'&&'Critico'}{ultimo.score==='precaucion'&&'Precaucion'}{ultimo.score==='optimo'&&'Optimo'}</div>:'-'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  </div></div>);
};const ModalImpresionPlaneacion=({entidad,datos,onClose})=>{
  const{ejes=[],objetivos=[],indicadores=[]}=datos;
  return(<div className="modal-overlay"><div className="modal" style={{maxWidth:'900px',width:'95%',maxHeight:'90vh',overflow:'auto'}}>
    <div className="modal-header"><h2>Planeacion - {entidad.nombre}</h2>
      <div style={{display:'flex',gap:'0.5rem'}}>
        <button className="btn-primary" style={{width:'auto'}} onClick={()=>window.print()}>Imprimir</button>
        <button className="btn-cerrar" onClick={onClose}>x</button>
      </div>
    </div>
    <div className="modal-body">
      {ejes.map(eje=>{
        const objsEje=objetivos.filter(o=>o.ejeId===eje.id);
        return(<div key={eje.id} style={{marginBottom:'1.5rem',borderLeft:'4px solid #4F46E5',paddingLeft:'1rem'}}>
          <h3 style={{color:'#4F46E5',margin:'0 0 0.5rem'}}>{eje.nombre}</h3>
          {objsEje.map(obj=>{
            const indsObj=indicadores.filter(i=>i.objetivoId===obj.id);
            return(<div key={obj.id} style={{marginLeft:'1rem',marginBottom:'0.75rem'}}>
              <h4 style={{margin:'0 0 0.25rem'}}>{obj.nombre}</h4>
              {indsObj.map(ind=><div key={ind.id} style={{marginLeft:'1rem',fontSize:'0.875rem',color:'#374151',padding:'0.25rem 0'}}>
                {ind.nombre} - Meta: {ind.meta} {ind.unidad}
              </div>)}
            </div>);
          })}
        </div>);
      })}
    </div>
  </div></div>);
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
